<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth - Prolearn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Outfit', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold text-xl mx-auto mb-4">P</div>
            <h2 id="form-title" class="text-3xl font-bold text-slate-900">Sign In</h2>
            <p id="form-subtitle" class="text-slate-500 mt-2">Welcome back! Please enter your details.</p>
        </div>

        <form id="auth-form" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Username</label>
                <input type="text" id="username" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="johndoe">
            </div>
            <div id="email-group" class="hidden">
                <label class="block text-sm font-semibold text-slate-700 mb-1">Email</label>
                <input type="email" id="email" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="john@example.com">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="••••••••">
            </div>
            <button type="submit" id="submit-btn" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg mt-4">Sign In</button>
        </form>

        <div class="mt-8 text-center">
            <p id="toggle-text" class="text-slate-600">Don't have an account? <a href="#" onclick="toggleAuth()" class="text-indigo-600 font-bold">Sign Up</a></p>
        </div>
    </div>

    <script>
        let isLogin = true;

        if (window.location.pathname.includes('/register')) {
            toggleAuth();
        }

        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? 'Sign In' : 'Create Account';
            document.getElementById('form-subtitle').innerText = isLogin ? 'Welcome back! Please enter your details.' : 'Join Prolearn and start your journey today.';
            document.getElementById('email-group').classList.toggle('hidden', isLogin);
            document.getElementById('submit-btn').innerText = isLogin ? 'Sign In' : 'Register';
            document.getElementById('toggle-text').innerHTML = isLogin ? 'Don\'t have an account? <a href="#" onclick="toggleAuth()" class="text-indigo-600 font-bold">Sign Up</a>' : 'Already have an account? <a href="#" onclick="toggleAuth()" class="text-indigo-600 font-bold">Sign In</a>';
        }

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value;

            const url = isLogin ? '/login' : '/register';
            const body = isLogin ? { username, password } : { username, email, password };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();
                if (response.ok) {
                    if (isLogin) {
                        localStorage.setItem('user', JSON.stringify(data));
                        localStorage.setItem('userId', data.user_id);
                        window.location.href = '/';
                    } else {
                        alert('Registration successful! Please login.');
                        toggleAuth();
                    }
                } else {
                    alert(data.detail || 'Something went wrong');
                }
            } catch (err) {
                alert('Connection error');
            }
        };
    </script>
</body>
</html>
